    async function dashH() {
      const tp = products.length, ts = inv.reduce((s,i)=>s+(i.qty||0),0), tv = products.reduce((s,p)=>s+stock(p.id)*(p.price||0),0);
      const today = new Date(); today.setHours(0,0,0,0);
      const tt = trans.filter(t=>(t.timestamp?.toDate?.()||new Date(t.timestamp))>=today);
      const tin = tt.filter(t=>t.type==='IN'||t.type==='MOVE_IN').reduce((s,t)=>s+(t.qty||0),0);
      const tou = tt.filter(t=>t.type==='OUT'||t.type==='MOVE_OUT'||t.type==='POS').reduce((s,t)=>s+(t.qty||0),0);
      const tpos = tt.filter(t=>t.type==='POS').reduce((s,t)=>s+(t.totalAmount||0),0);

    function rBV() { const bs=allBins().map(bin=>({bin,count:inv.filter(i=>i.bin===bin).length,qty:inv.filter(i=>i.bin===bin).reduce((s,i)=>s+(i.qty||0),0)})); if(!bs.length) return '<div class="card"><div class="empty-state"><p>Belum ada Bin</p></div></div>'; return `<div class="card"><div class="card-title">📦 Daftar Bin</div><div class="bin-grid" id="binGrid">${bs.map(b=>`<div class="bin-card" data-bin="${b.bin}"><div class="bin-icon">📦</div><div class="bin-info"><div class="bin-name">Bin ${b.bin}</div><div class="bin-count">${b.count} item · ${b.qty} unit</div></div></div>`).join('')}</div></div>`; }

    function showBin(bin) { const items=inv.filter(i=>i.bin===bin); modal(`<h3>📦 Bin ${bin}</h3><p>${items.length} item · ${items.reduce((s,i)=>s+(i.qty||0),0)} unit</p><div class="list">${items.map(i=>{const p=products.find(x=>x.id===i.productId);return`<div class="list-item"><span>📦</span><div style="flex:1;"><div style="font-weight:600;">${p?.name||i.sku}</div><div style="font-size:0.72rem;">SKU:${i.sku} | Qty:${i.qty}</div></div></div>`}).join('')}</div><div style="margin-top:12px;"><button class="btn btn-transfer-bin btn-block" id="transferBinBtn">🔄 Transfer Bin</button></div>`);document.getElementById('transferBinBtn').addEventListener('click',()=>{closeM();setTimeout(()=>showTransferBinForm(bin),200);}); }
    function showTransferBinForm(fromBin) {
      const items=inv.filter(i=>i.bin===fromBin);
      const allBinsList=allBins();
      modal(`<h3>🔄 Transfer Bin</h3><p style="color:#64748b;">Dari: <strong>${fromBin}</strong></p>
        <div class="form-group"><label class="form-label">Produk</label><select id="tbProduct"><option value="">Pilih produk</option>${items.map(i=>{const p=products.find(x=>x.id===i.productId);return`<option value="${i.productId}" data-inv="${i.id}" data-qty="${i.qty}">${p?.name||i.sku} (Stok: ${i.qty})</option>`}).join('')}</select></div>
        <div class="input-row"><div class="form-group"><label class="form-label">Qty Transfer</label><input type="number" id="tbQty" value="1" min="1"></div><div class="form-group"><label class="form-label">Ke Bin</label><select id="tbToBin"><option value="">Pilih tujuan</option>${allBinsList.filter(b=>b!==fromBin).map(b=>`<option value="${b}">${b}</option>`).join('')}<option value="__new__">+ Bin Baru</option></select></div></div>
        <div class="form-group" id="tbNewBinWrap" style="display:none;"><label class="form-label">Nama Bin Baru</label><input type="text" id="tbNewBin" placeholder="Contoh: A1-BARU"></div>
        <div class="form-group"><label class="form-label">Catatan</label><input type="text" id="tbNote" placeholder="Opsional"></div>
        <button class="btn btn-transfer-bin btn-block" id="doTransferBin">🔄 Proses Transfer</button>`);
      document.getElementById('tbToBin').addEventListener('change',function(){document.getElementById('tbNewBinWrap').style.display=this.value==='__new__'?'block':'none';});
      document.getElementById('doTransferBin').addEventListener('click',async()=>{
        const pid=document.getElementById('tbProduct').value;
        const qty=parseInt(document.getElementById('tbQty').value)||0;
        const toBinSel=document.getElementById('tbToBin').value;
        const toBin=toBinSel==='__new__'?document.getElementById('tbNewBin').value.trim():toBinSel;
        const note=document.getElementById('tbNote').value.trim();
        if(!pid||qty<1||!toBin){errS();return toast('⚠️ Lengkapi data');}
        const selOpt=document.querySelector('#tbProduct option:checked');
        const invId=selOpt?.dataset.inv;
        const avail=parseInt(selOpt?.dataset.qty||0);
        if(qty>avail){errS();return toast('⚠️ Qty melebihi stok');}
        try{
          const srcInv=inv.find(i=>i.id===invId);
          const newQty=(srcInv?.qty||0)-qty;
          if(newQty<=0)await deleteDoc(uDoc("inventory",invId));
          else await updateDoc(uDoc("inventory",invId),{qty:newQty,updatedAt:new Date()});
          const destInv=inv.find(i=>i.productId===pid&&i.bin.toLowerCase()===toBin.toLowerCase());
          if(destInv)await updateDoc(uDoc("inventory",destInv.id),{qty:(destInv.qty||0)+qty,updatedAt:new Date()});
          else await addDoc(uCol("inventory"),{productId:pid,sku:srcInv?.sku||'',bin:toBin,qty,created:new Date(),userId:U.uid});
          const pn=products.find(x=>x.id===pid)?.name||'';
          await addDoc(uCol("transactions"),{type:'MOVE_OUT',productId:pid,productName:pn,sku:srcInv?.sku||'',qty,bin:fromBin,purpose:`Transfer ke ${toBin}`,note,timestamp:new Date(),userId:U.uid,userEmail:U.email});
          await addDoc(uCol("transactions"),{type:'MOVE_IN',productId:pid,productName:pn,sku:srcInv?.sku||'',qty,bin:toBin,purpose:`Transfer dari ${fromBin}`,note,timestamp:new Date(),userId:U.uid,userEmail:U.email});
          okS();toast(`✅ Transfer ${qty} unit ke ${toBin}`);closeM();await loadAll();renderPg('products');
        }catch(e){errS();toast('❌ '+e.message);}
      });
    }
    function showDet(pid) { const p=products.find(x=>x.id===pid);if(!p)return;modal(`<h3>${p.name}</h3><span class="badge badge-blue">SKU:${p.sku}</span><div class="stats-grid" style="margin:8px 0;"><div class="stat-card blue"><div class="stat-value">${stock(pid)}</div><div class="stat-label">Stok</div></div></div><div style="display:flex;gap:6px;"><button class="btn btn-primary btn-sm" id="edBtn">✏️ Edit</button><button class="btn btn-danger btn-sm" id="dlBtn">🗑️ Hapus</button></div>`);document.getElementById('edBtn').addEventListener('click',()=>{closeM();setTimeout(()=>showEdit(pid),200);});document.getElementById('dlBtn').addEventListener('click',async()=>{if(confirm('Hapus?')){const ivs=inv.filter(i=>i.productId===pid);for(const iv of ivs)await deleteDoc(uDoc("inventory",iv.id));await deleteDoc(uDoc("products",pid));closeM();await loadAll();renderPg('products');}}); }
    function showEdit(pid) { const p=products.find(x=>x.id===pid);if(!p)return;modal(`<h3>✏️ Edit</h3><div class="form-group"><label class="form-label">SKU</label><input type="text" id="eSKU" value="${p.sku}"></div><div class="form-group"><label class="form-label">Nama</label><input type="text" id="eName" value="${p.name}"></div><div class="input-row"><div class="form-group"><label class="form-label">Min</label><input type="number" id="eMin" value="${p.minStock||5}"></div><div class="form-group"><label class="form-label">Harga</label><input type="number" id="ePrice" value="${p.price||0}"></div></div><button class="btn btn-primary btn-block" id="svEdit">💾 Simpan</button>`);document.getElementById('svEdit').addEventListener('click',async()=>{await updateDoc(uDoc("products",pid),{sku:document.getElementById('eSKU').value,name:document.getElementById('eName').value,minStock:parseInt(document.getElementById('eMin').value)||5,price:parseInt(document.getElementById('ePrice').value)||0});okS();closeM();await loadAll();renderPg('products');}); }
    function showTrk(pid) {
      const p=products.find(x=>x.id===pid);if(!p)return;
      const ptr=trans.filter(t=>t.productId===pid).sort((a,b)=>((b.timestamp?.toDate?.()||new Date(b.timestamp))-(a.timestamp?.toDate?.()||new Date(a.timestamp))));
      let rs=stock(pid);const tl=ptr.map(t=>{const d=t.timestamp?.toDate?.()||new Date(t.timestamp);const it={date:d,type:t.type,qty:t.qty,purpose:t.purpose||t.note||'',note:t.note||'',bin:t.bin||'',noDO:t.noDO||'',noTO:t.noTO||'',invoiceNo:t.invoiceNo||'',sellPrice:t.sellPrice||0,totalAmount:t.totalAmount||0,stockAfter:rs};rs=(t.type==='IN'||t.type==='MOVE_IN')?rs-t.qty:rs+t.qty;return it;});
      modal(`<h3>📈 ${p.name}</h3><p style="color:#64748b;">SKU:${p.sku} | Stok:<strong>${stock(pid)}</strong></p><div class="card"><div class="card-title">📊 Grafik</div><div class="chart-container"><canvas id="trackChart"></canvas></div></div><div class="card"><div class="card-title">📜 Riwayat (${tl.length})</div>${tl.length?`<div class="timeline">${tl.map(i=>{let lb,lc,ic='';if(i.type==='IN'){lb='📥 Masuk';lc='type-in';}else if(i.type==='MOVE_IN'){lb='🔄 Transfer Masuk';lc='type-move';ic='move';}else if(i.type==='MOVE_OUT'){lb='🔄 Transfer Keluar';lc='type-move';ic='move';}else if(i.type==='POS'){lb='💰 POS';lc='type-pos';ic='pos';}else{lb='📤 Transfer Out';lc='type-out';ic='out';}const ib=i.invoiceNo?`<span class="pos-badge">${i.invoiceNo}</span>`:'';const db=i.noDO?`<span class="do-badge">DO:${i.noDO}</span>`:'';const tb=i.noTO?`<span class="to-badge">${i.noTO}</span>`:'';const pi=i.type==='POS'?` · ${frp(i.sellPrice)}/unit · Total:${frp(i.totalAmount)}`:'';return`<div class="timeline-item ${ic}"><div class="timeline-header"><span class="timeline-type ${lc}">${lb}</span><span class="timeline-date">${i.date.toLocaleDateString('id-ID',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span></div><div class="timeline-detail"><strong>${i.type==='IN'||i.type==='MOVE_IN'?'+':'-'}${i.qty} unit</strong> → ${i.bin} ${i.purpose?`· ${i.purpose}`:''} ${ib}${db}${tb}${pi}</div><div class="timeline-meta">Stok: ${i.stockAfter}${i.note?` · ${i.note}`:''}</div></div>`}).join('')}</div>`:'<div style="text-align:center;padding:20px;">Belum ada</div>'}</div>`);
      setTimeout(()=>{const c=document.getElementById('trackChart');if(!c||!tl.length)return;if(modalChart)modalChart.destroy();const l=[],d=[];const td=new Date();for(let i=6;i>=0;i--){const dd=new Date(td);dd.setDate(dd.getDate()-i);l.push(dd.toLocaleDateString('id-ID',{day:'numeric',month:'short'}));let s=stock(pid);ptr.forEach(t=>{const tdd=t.timestamp?.toDate?.()||new Date(t.timestamp);if(tdd>dd)s+=(t.type==='OUT'||t.type==='MOVE_OUT'||t.type==='POS'?t.qty:-t.qty);});d.push(Math.max(0,s));}modalChart=new Chart(c.getContext('2d'),{type:'line',data:{labels:l,datasets:[{label:'Stok',data:d,borderColor:'#8b5cf6',fill:true}]}});},300);
    }

    // REPORTS
    async function repH() {
      const tv=products.reduce((s,p)=>s+stock(p.id)*(p.price||0),0);
      const totalPOS=trans.filter(t=>t.type==='POS').reduce((s,t)=>s+(t.totalAmount||0),0);
      const totalIN=trans.filter(t=>t.type==='IN'||t.type==='MOVE_IN').reduce((s,t)=>s+(t.qty||0),0);
      const totalOUT=trans.filter(t=>t.type==='OUT'||t.type==='MOVE_OUT').reduce((s,t)=>s+(t.qty||0),0);
      const totalPOSqty=trans.filter(t=>t.type==='POS').reduce((s,t)=>s+(t.qty||0),0);
      const typeOpts=['Semua','IN','OUT','POS','MOVE_IN','MOVE_OUT'];
      return `
      <div class="card" style="background:linear-gradient(135deg,#1e40af,#3b82f6);color:white;padding:18px;">
        <div style="font-size:0.8rem;opacity:0.85;">Total Nilai Inventory</div>
        <div style="font-size:1.8rem;font-weight:800;">${frp(tv)}</div>
        <div style="font-size:0.75rem;opacity:0.75;">${products.length} produk</div>
      </div>
      <div class="stats-grid-4">
        <div class="stat-card green"><div class="stat-value-sm">${frp(totalPOS)}</div><div class="stat-label">Total POS</div></div>
        <div class="stat-card blue"><div class="stat-value-sm">${totalIN}</div><div class="stat-label">Total Masuk</div></div>
        <div class="stat-card red"><div class="stat-value-sm">${totalOUT}</div><div class="stat-label">Total Keluar</div></div>
        <div class="stat-card orange"><div class="stat-value-sm">${totalPOSqty}</div><div class="stat-label">Qty Terjual</div></div>
      </div>
      <div class="card"><div class="card-title">📈 Grafik 7 Hari</div><div class="chart-container"><canvas id="reportChart"></canvas></div></div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">📋 Semua Transaksi (${trans.length})</span>
          <button class="btn btn-success btn-sm" id="exportExcelBtn">📊 Export Excel</button>
        </div>
        <div class="report-filter-bar" style="margin-bottom:10px;">
          <input type="text" id="repSearch" placeholder="🔍 Cari produk/SKU..." style="flex:2;min-width:120px;">
          <select id="repType" style="flex:1;min-width:90px;"><option value="">Semua Tipe</option>${typeOpts.slice(1).map(t=>`<option>${t}</option>`).join('')}</select>
          <input type="date" id="repDateFrom" style="flex:1;min-width:110px;">
          <input type="date" id="repDateTo" style="flex:1;min-width:110px;">
        </div>
        <div class="report-table-wrap">
          <table class="report-table" id="reportTable">
            <thead><tr>
              <th>#</th><th>Tgl</th><th>Tipe</th><th>Produk</th><th>SKU</th>
              <th>Qty</th><th>Bin</th><th>No DO/TO/INV</th><th>Harga</th><th>Total</th><th>Catatan</th>
            </tr></thead>
            <tbody id="reportTbody">${rRepRows(trans)}</tbody>
          </table>
        </div>
        <div id="repRowCount" style="font-size:0.75rem;color:#64748b;margin-top:6px;text-align:right;">${trans.length} transaksi</div>
      </div>`;
    }
    function typeBadge(t){const m={IN:'type-in-badge',OUT:'type-out-badge',POS:'type-pos-badge',MOVE_IN:'type-move-badge',MOVE_OUT:'type-move-badge'};return`<span class="type-badge ${m[t]||''}">${t}</span>`;}
    function rRepRows(data){
      if(!data.length)return`<tr><td colspan="11" style="text-align:center;padding:20px;color:#94a3b8;">Belum ada transaksi</td></tr>`;
      return data.map((t,i)=>{
        const ref=t.noDO||t.noTO||t.invoiceNo||'';
        const harga=t.sellPrice?frp(t.sellPrice):'';
        const total=t.totalAmount?frp(t.totalAmount):'';
        return`<tr>
          <td style="color:#94a3b8;font-size:0.72rem;">${i+1}</td>
          <td style="white-space:nowrap;font-size:0.72rem;">${fd(t.timestamp)}</td>
          <td>${typeBadge(t.type)}</td>
          <td style="font-weight:600;max-width:100px;word-break:break-word;">${t.productName||'-'}</td>
          <td style="font-size:0.72rem;color:#64748b;">${t.sku||'-'}</td>
          <td style="text-align:center;font-weight:700;">${t.qty||0}</td>
          <td style="font-size:0.75rem;">${t.bin||'-'}</td>
          <td style="font-size:0.7rem;color:#1e40af;">${ref||'-'}</td>
          <td style="font-size:0.75rem;text-align:right;">${harga||'-'}</td>
          <td style="font-size:0.75rem;text-align:right;font-weight:600;">${total||'-'}</td>
          <td style="font-size:0.7rem;color:#64748b;max-width:80px;word-break:break-word;">${t.note||t.purpose||'-'}</td>
        </tr>`;
      }).join('');
    }
    function initRep() {
      setTimeout(()=>{const c=document.getElementById('reportChart');if(!c)return;if(chart)chart.destroy();const l=[],i=[],o=[];const t=new Date();for(let x=6;x>=0;x--){const d=new Date(t);d.setDate(d.getDate()-x);l.push(d.toLocaleDateString('id-ID',{day:'numeric',month:'short'}));let di=0,du=0;trans.forEach(tx=>{try{const dd=tx.timestamp?.toDate?.()||new Date(tx.timestamp);if(dd.toDateString()===d.toDateString()){if(tx.type==='IN'||tx.type==='MOVE_IN')di+=tx.qty||0;else du+=tx.qty||0;}}catch{}});i.push(di);o.push(du);}chart=new Chart(c.getContext('2d'),{type:'bar',data:{labels:l,datasets:[{label:'Masuk',data:i,backgroundColor:'rgba(5,150,105,0.7)'},{label:'Keluar',data:o,backgroundColor:'rgba(220,38,38,0.7)'}]}});},300);
      function filterRep(){
        const q=(document.getElementById('repSearch')?.value||'').toLowerCase();
        const tp=document.getElementById('repType')?.value||'';
        const df=document.getElementById('repDateFrom')?.value;
        const dt=document.getElementById('repDateTo')?.value;
        let filtered=trans.filter(t=>{
          if(tp&&t.type!==tp)return false;
          const pn=(t.productName||'').toLowerCase(),sk=(t.sku||'').toLowerCase();
          if(q&&!pn.includes(q)&&!sk.includes(q))return false;
          if(df||dt){const d=t.timestamp?.toDate?.()||new Date(t.timestamp);const ds=d.toISOString().slice(0,10);if(df&&ds<df)return false;if(dt&&ds>dt)return false;}
          return true;
        });
        document.getElementById('reportTbody').innerHTML=rRepRows(filtered);
        document.getElementById('repRowCount').textContent=`${filtered.length} transaksi`;
      }
      document.getElementById('repSearch')?.addEventListener('input',filterRep);
      document.getElementById('repType')?.addEventListener('change',filterRep);
      document.getElementById('repDateFrom')?.addEventListener('change',filterRep);
      document.getElementById('repDateTo')?.addEventListener('change',filterRep);
    }

    document.addEventListener('click',function(e){
      if(e.target.id==='exportExcelBtn'||e.target.closest('#exportExcelBtn')){
        // Get currently filtered rows or all trans
        const q=(document.getElementById('repSearch')?.value||'').toLowerCase();
        const tp=document.getElementById('repType')?.value||'';
        const df=document.getElementById('repDateFrom')?.value;
        const dt=document.getElementById('repDateTo')?.value;
        let filtered=trans.filter(t=>{
          if(tp&&t.type!==tp)return false;
          const pn=(t.productName||'').toLowerCase(),sk=(t.sku||'').toLowerCase();
          if(q&&!pn.includes(q)&&!sk.includes(q))return false;
          if(df||dt){const d=t.timestamp?.toDate?.()||new Date(t.timestamp);const ds=d.toISOString().slice(0,10);if(df&&ds<df)return false;if(dt&&ds>dt)return false;}
          return true;
        });
        // Build worksheet data
        const headers=['No','Tanggal','Tipe','Nama Produk','SKU','Qty','Bin','No DO/TO/INV','Harga Satuan','Total Amount','Catatan/Tujuan'];
        const rows=filtered.map((t,i)=>[
          i+1,
          fd(t.timestamp),
          t.type||'',
          t.productName||'',
          t.sku||'',
          t.qty||0,
          t.bin||'',
          t.noDO||t.noTO||t.invoiceNo||'',
          t.sellPrice||0,
          t.totalAmount||0,
          t.note||t.purpose||''
        ]);
        // Summary sheet
        const tv=products.reduce((s,p)=>s+stock(p.id)*(p.price||0),0);
        const sumRows=[
          ['LAPORAN INVENTORYPRO'],
          ['Tanggal Export',new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})],
          [''],
          ['RINGKASAN'],
          ['Total Produk',products.length],
          ['Total Nilai Inventory',tv],
          ['Total Penjualan POS',trans.filter(t=>t.type==='POS').reduce((s,t)=>s+(t.totalAmount||0),0)],
          ['Total Qty Masuk',trans.filter(t=>t.type==='IN'||t.type==='MOVE_IN').reduce((s,t)=>s+(t.qty||0),0)],
          ['Total Qty Keluar',trans.filter(t=>t.type==='OUT'||t.type==='MOVE_OUT').reduce((s,t)=>s+(t.qty||0),0)],
          ['Total Transaksi POS',trans.filter(t=>t.type==='POS').length],
          [''],
        ];
        // Create workbook via CSV fallback if SheetJS not available
        if(typeof XLSX!=='undefined'){
          const wb=XLSX.utils.book_new();
          const wsSummary=XLSX.utils.aoa_to_sheet(sumRows);
          const wsData=XLSX.utils.aoa_to_sheet([headers,...rows]);
          // Column widths
          wsData['!cols']=[{wch:5},{wch:18},{wch:10},{wch:22},{wch:12},{wch:7},{wch:8},{wch:20},{wch:14},{wch:14},{wch:20}];
          XLSX.utils.book_append_sheet(wb,wsSummary,'Ringkasan');
          XLSX.utils.book_append_sheet(wb,wsData,'Transaksi');
          XLSX.writeFile(wb,`laporan_${new Date().toISOString().slice(0,10)}.xlsx`);
          toast('📊 Excel berhasil diunduh!');
        } else {
          // CSV fallback
          let csv=headers.join(',')+'\n';
          rows.forEach(r=>{csv+=r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')+'\n';});
          const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
          const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`laporan_${new Date().toISOString().slice(0,10)}.csv`;a.click();
          toast('📥 CSV berhasil diunduh!');
        }
      }
    });
    document.getElementById('syncBtn').addEventListener('click',async()=>{await stopAll();await loadAll();await renderPg(page);okS();toast('✅ Tersinkron');});
    window.addEventListener('beforeunload',()=>stopAll());
    loadAll();
  </script>
</body>
</html>
