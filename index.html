<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WMS Mobile</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
  <h2>WMS Mobile</h2>

  <!-- SCAN -->
  <button onclick="startScan()">Scan Barcode</button>
  <video id="preview" width="100%"></video>

  <!-- FORM -->
  <input type="text" id="barcode" placeholder="Barcode">
  <input type="text" id="nama" placeholder="Nama Barang">
  <input type="number" id="qty" placeholder="Qty">

  <button onclick="saveItem()">Simpan</button>

  <h3>List Barang</h3>
  <ul id="itemList"></ul>

  <button onclick="logout()">Logout</button>
</div>

<!-- LIBRARY SCANNER -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module" src="app.js"></script>
</body>
</html>
